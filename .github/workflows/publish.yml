on:
  push:
    branches: main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            tidyverse
            gtsummary
            here
      - uses: quarto-dev/quarto-actions/setup@v2
      - run: quarto render
      - uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages